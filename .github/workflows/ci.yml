name: lifecycle
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - run: make format lint test
      - run: grep -F "$(cat expected.txt)" index.html
  deploy:
    if: github.event_name == 'push'
    needs: ci
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    outputs:
      page_url: ${{ steps.pages.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - run: python3 build_site.py --git-sha "$GITHUB_SHA" --output _site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: {path: _site}
      - id: pages
        uses: actions/deploy-pages@v4
  smoke:
    if: github.event_name == 'push'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify product and exact build identity
        env:
          EXPECTED_SHA: ${{ github.sha }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          curl -fsSL --retry 12 --retry-all-errors --retry-delay 5 "$PAGE_URL" | grep -F 'Booking confirmed'
          curl -fsSL "${PAGE_URL%/}/.well-known/soloco-build.json" -o /tmp/soloco-build.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          identity = json.loads(Path("/tmp/soloco-build.json").read_text())
          assert identity == {
              "product_id": "proofbook",
              "git_sha": os.environ["EXPECTED_SHA"],
          }, identity
          PY
